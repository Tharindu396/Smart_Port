version: '3.8'

services:
  # ─── Databases & Message Queue ───────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: smartport-postgres
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: smartport
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartport-network

  redis:
    image: redis:7-alpine
    container_name: smartport-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartport-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smartport-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartport-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smartport-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'echo', 'ruok', '|', 'nc', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartport-network

  neo4j:
    image: neo4j:5-community
    container_name: smartport-neo4j
    ports:
      - '7474:7474'   
      - '7687:7687'   
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD', 'cypher-shell', '-u', 'neo4j', '-p', 'password', 'RETURN 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartport-network

  # ─── Backend Services ────────────────────────────────────────────────────────

  vessel-tracking-service:
    build:
      context: ./smart_port_be/vessel_tracking_service
      dockerfile: Dockerfile
    container_name: smartport-vessel-tracking
    ports:
      - '8001:8001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 8001
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/smartport
      DB_HOST: postgres        
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: smartport
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
      AIS_URL: wss://stream.aisstream.io/v0/stream
      AIS_API_KEY: ${AIS_API_KEY:-878c301b29f41def068d36c7e741d58f1f0c6b88}
      FRONTEND_URL: http://localhost:3000
    networks:
      - smartport-network
    restart: unless-stopped

  berthing-service:
    build:
      context: ./smart_port_be/berthing_service
      dockerfile: Dockerfile
    container_name: smartport-berthing
    ports:
      - '8002:8002'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy 
    environment:
      PORT: 8002
      DB_HOST: postgres
      DATABASE_URL: postgres://postgres:123456@postgres:5432/smartport
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: smartport
      DB_SSLMODE: disable
      KAFKA_BROKERS: kafka:29092
      FRONTEND_URL: http://localhost:3000
      NEO4J_URI: bolt://neo4j:7687  
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    networks:
      - smartport-network
    restart: unless-stopped

  invoice-service:
    build:
      context: ./smart_port_be/invoice_service
      dockerfile: Dockerfile
    container_name: smartport-invoice
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:123456@postgres:5432/smartport
      DB_HOST: postgres        
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: smartport
      NODE_ENV: development
      PORT: 3001
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: invoice-service
    networks:
      - smartport-network
    restart: unless-stopped

  logistics-service:
    build:
      context: ./smart_port_be/logistics_service
      dockerfile: Dockerfile
    container_name: smartport-logistics
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:123456@postgres:5432/smartport
      DATABASE_HOST: postgres        
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: 123456
      DATABASE_NAME: smartport
      NODE_ENV: development
      KAFKA_BROKERS: localhost:9092
      PORT: 3002
      FRONTEND_URL: http://localhost:3000
    networks:
      - smartport-network
    restart: unless-stopped

  nest-services:
    build:
      context: ./smart_port_be/nest_services
      dockerfile: Dockerfile
    container_name: smartport-nest-services
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:123456@postgres:5432/smartport
      DB_HOST: postgres        
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      DB_NAME: smartport
      INITIAL_ADMIN_NAME: john
      INITIAL_ADMIN_EMAIL: john@example.com
      INITIAL_ADMIN_PASSWORD: 123
      NODE_ENV: development
      PORT: 3003
    networks:
      - smartport-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./smart_port_be/notification_service
      dockerfile: Dockerfile
    container_name: smartport-notification
    ports:
      - '3004:3004'
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3004
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: notification-service
      DATABASE_URL: postgres://postgres:123456@postgres:5432/smartport
      DB_HOST: postgres        
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: smartport
    networks:
      - smartport-network
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./smart_port_fe
      dockerfile: Dockerfile
    container_name: smartport-frontend
    ports:
      - '3000:3000'
    depends_on:
      - vessel-tracking-service
      - berthing-service
      - invoice-service
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8001
    networks:
      - smartport-network
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:

networks:
  smartport-network:
    driver: bridge
