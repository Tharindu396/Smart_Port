name: Smart Port CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Prevent concurrent deploys to the same environment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  TF_VERSION: 1.8.0

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: notification-service
            path: smart_port_be/notification_service
            lang: node
          - name: invoice-service
            path: smart_port_be/invoice_service
            lang: node
          - name: logistics-service
            path: smart_port_be/logistics_service
            lang: node
          - name: nest-services
            path: smart_port_be/nest_services
            lang: node
          - name: vessel-tracking-service
            path: smart_port_be/vessel_tracking_service
            lang: go
          - name: berthing-service
            path: smart_port_be/berthing_service
            lang: go
          - name: frontend
            path: smart_port_fe
            lang: node

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js services ──
      - name: Setup Node.js
        if: matrix.service.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install Node dependencies
        if: matrix.service.lang == 'node'
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Build Node service
        if: matrix.service.lang == 'node'
        working-directory: ${{ matrix.service.path }}
        run: npm run build --if-present

      - name: Run Node tests
        if: matrix.service.lang == 'node'
        working-directory: ${{ matrix.service.path }}
        run: npm test --if-present -- --passWithNoTests
        env:
          NODE_ENV: test

      # ── Go services ──
      - name: Setup Go
        if: matrix.service.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ matrix.service.path }}/go.sum

      - name: Build Go service
        if: matrix.service.lang == 'go'
        working-directory: ${{ matrix.service.path }}
        run: go build ./...

      - name: Run Go tests
        if: matrix.service.lang == 'go'
        working-directory: ${{ matrix.service.path }}
        run: go test ./... -v -coverprofile=coverage.out

  # ── 2. Build & Push Docker Images ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      id-token: write   # for OIDC auth with AWS
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: notification-service
            path: smart_port_be/notification_service
            ecr_repo: smartport/notification-service
          - name: invoice-service
            path: smart_port_be/invoice_service
            ecr_repo: smartport/invoice-service
          - name: logistics-service
            path: smart_port_be/logistics_service
            ecr_repo: smartport/logistics-service
          - name: nest-services
            path: smart_port_be/nest_services
            ecr_repo: smartport/nest-services
          - name: vessel-tracking-service
            path: smart_port_be/vessel_tracking_service
            ecr_repo: smartport/vessel-tracking-service
          - name: berthing-service
            path: smart_port_be/berthing_service
            ecr_repo: smartport/berthing-service
          - name: frontend
            path: smart_port_fe
            ecr_repo: smartport/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

      - name: Output image URI
        run: |
          echo "Pushed: ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:sha-${{ github.sha }}"

  # ── 3. Terraform Plan ───────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="image_tag=sha-${{ github.sha }}" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_smtp_pass: ${{ secrets.SMTP_PASS }}
          TF_VAR_ais_api_key: ${{ secrets.AIS_API_KEY }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 7

  # ── 4. Terraform Apply ──────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    environment: production     # requires manual approval in GitHub
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_smtp_pass: ${{ secrets.SMTP_PASS }}
          TF_VAR_ais_api_key: ${{ secrets.AIS_API_KEY }}

      - name: Force ECS service redeployment
        run: |
          SERVICES=(
            "notification-service"
            "invoice-service"
            "logistics-service"
            "nest-services"
            "vessel-tracking-service"
            "berthing-service"
            "frontend"
          )
          for svc in "${SERVICES[@]}"; do
            aws ecs update-service \
              --cluster smartport-cluster \
              --service "smartport-${svc}" \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
            echo "Triggered redeployment: smartport-${svc}"
          done
