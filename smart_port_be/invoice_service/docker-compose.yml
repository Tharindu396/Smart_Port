version: '3.8'

services:
  invoice-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartport_invoice_service
    ports:
      - '5004:5004'
    environment:
      PORT: 5004
      DB_HOST: invoice-postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: invoice_db
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: invoice-service-group
      KAFKA_CLIENT_ID: invoice-service
      # Points to the Berthing Service container on the shared network
      BERTHING_SERVICE_URL: http://smartport_berthing_app:5003
      TARIFF_BERTH_PER_HOUR: '150.00'
      TARIFF_PORT_FEE: '500.00'
      TARIFF_PENALTY_PER_HOUR: '300.00'
      TARIFF_YARD_PER_CONTAINER_PER_HOUR: '12.00'
    depends_on:
      - invoice-postgres
    networks:
      - smartport_network
    restart: unless-stopped

  invoice-postgres:
    image: postgres:16-alpine
    container_name: smartport_invoice_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoice_db
    ports:
      - '5435:5432'
    volumes:
      - invoice_postgres_data:/var/lib/postgresql/data
    networks:
      - smartport_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invoice_postgres_data:

networks:
  smartport_network:
    # Shared with berthing_service. Create it first if running standalone:
    # docker network create smartport_network
    external: true