version: '3.8'

services:

  # Infrastructure

  neo4j-db:
    image: neo4j:5.12
    container_name: smartport_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./berthing_service/neo4j/data:/data
      - ./berthing_service/neo4j/logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - smartport_network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smartport_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Dual Listeners: 'kafka' for Docker apps, 'localhost' for local development
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - smartport_network

  # Berthing Service

  berthing-app:
    build: ./berthing_service
    container_name: smartport_berthing_app
    ports:
      - "5003:5003"
    environment:
      - SERVER_PORT=5003
      - NEO4J_URI=bolt://neo4j-db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      neo4j-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - smartport_network

  # Logistics Service

  logistics-db:
    image: postgres:15
    container_name: smartport_logistics_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logistics_db
    volumes:
      - logistics_postgres_data:/var/lib/postgresql/data
    networks:
      - smartport_network

  # Invoice Service

  invoice-postgres:
    image: postgres:16-alpine
    container_name: smartport_invoice_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoice_db
    ports:
      - "5435:5432"
    volumes:
      - invoice_postgres_data:/var/lib/postgresql/data
    networks:
      - smartport_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  invoice-app:
    build: ./invoice_service
    container_name: smartport_invoice_app
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
      DB_HOST: invoice-postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: invoice_db
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: invoice-service-group
      KAFKA_CLIENT_ID: invoice-service
      BERTHING_SERVICE_URL: http://smartport_berthing_app:5003
      TARIFF_BERTH_PER_HOUR: '150.00'
      TARIFF_PORT_FEE: '500.00'
      TARIFF_PENALTY_PER_HOUR: '300.00'
      TARIFF_YARD_PER_CONTAINER_PER_HOUR: '12.00'
    depends_on:
      invoice-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      berthing-app:
        condition: service_started
    networks:
      - smartport_network
    restart: unless-stopped

# Volumes

volumes:
  logistics_postgres_data:
  invoice_postgres_data:

# Networks 

networks:
  smartport_network:
    external: true