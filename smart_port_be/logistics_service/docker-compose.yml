version: '3.8'

services:
  logistics-db:
    image: postgres:15
    container_name: smartport_logistics_db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logistics_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

networks:
  smartport_network:
    external: true